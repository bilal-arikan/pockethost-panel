# Fully self-contained: one container runs the panel + reverse proxy and spawns
# a PocketBase process per instance. Data lives in a named volume. No host
# network/PID, no privileged, no ssh — runs identically on Windows/macOS/Linux.
services:
  panel:
    build: .
    image: pocketbase-forge
    container_name: pocketbase-forge
    restart: unless-stopped
    env_file: .env
    # App binds PORT internally and generates instance URLs with it, so the
    # host mapping must use the same port on both sides.
    ports:
      - "${PORT:-8090}:${PORT:-8090}"
    volumes:
      - pbdata:/data

volumes:
  pbdata:
    # Pinned name so the data survives project/directory renames.
    name: pocketbaseforge_data
